<style>
/* ── Design Token ── */
:root{
  --font:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --text-primary:#334155;
  --text-secondary:#94A3B8;
  --color-positive:#2563EB;
  --color-negative:#DC2626;
  --color-brand:#1E3A8A;
  --bg:#f8fafc;
  --card-bg:#fff;
  --border:#e8edf3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);font-size:14px;font-weight:400}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(30,58,138,.07)}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo{width:32px;height:32px;border-radius:10px;background:none;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px}
.header p{font-size:12px;color:var(--text-secondary);font-weight:400}
.badges{margin-left:auto;display:flex;gap:6px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;border:1px solid}
.badge-indigo{background:#EFF6FF;color:var(--color-brand);border-color:#BFDBFE}
.badge-green{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.formula-bar{font-size:11px;color:var(--text-secondary);font-family:'Pretendard',monospace;background:#f8fafc;border-radius:8px;padding:5px 10px;margin-bottom:8px;font-weight:400;letter-spacing:.2px}

/* ── Sidebar Tabs ── */
.tabs{display:flex;flex-direction:column;gap:5px;width:100%}
.tab{padding:9px 12px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;background:transparent;transition:.15s;width:100%;text-align:left;font-family:var(--font)}
.tab.active{background:var(--color-brand);color:#fff;box-shadow:0 2px 8px rgba(30,58,138,.3)}
.tab:hover:not(.active){background:#EFF6FF;color:var(--color-brand)}

/* ── Layout ── */
.page-body{display:flex;align-items:flex-start;max-width:1280px;margin:0 auto}
.month-sidebar{width:168px;flex-shrink:0;padding:16px 12px;position:sticky;align-self:flex-start;display:flex;flex-direction:column;gap:6px}
#month-btns{display:flex;flex-direction:row;gap:6px;flex-wrap:wrap}
#month-btns .ftag{text-align:center;border-radius:8px;padding:5px 10px;font-size:12px;line-height:1.4;font-weight:600}
.ftag.active{background:var(--color-brand);color:#fff;border-color:var(--color-brand)}
.main{flex:1;padding:16px;min-width:0}
.section{display:none}.section.active{display:block}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}

/* ── Card ── */
.card{background:var(--card-bg);border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(30,58,138,.06);border:1px solid var(--border)}

/* ── KPI ── */
.kpi-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:5px;letter-spacing:.1px}
.kpi-value{font-size:28px;font-weight:800;margin-bottom:3px;letter-spacing:-.5px;line-height:1.1}
.kpi-sub{font-size:12px;color:var(--text-secondary);font-weight:400}
.kpi-formula{font-size:11px;color:#93c5fd;font-family:var(--font);margin-top:3px}

/* ── Section titles ── */
.section-title{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:3px;letter-spacing:-.2px}
.section-sub{font-size:12px;color:var(--text-secondary);font-weight:400;margin-bottom:12px}

/* ── Semantic colors ── */
.c-indigo{color:#4f46e5}
.c-green{color:#16a34a}
.c-amber{color:#d97706}
.c-purple{color:#9333ea}
.c-blue{color:var(--color-positive)}
.c-red{color:var(--color-negative)}

/* ── Charts & Tables ── */
.chart-wrap{width:100%;overflow:hidden}
svg text{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:2px solid #f1f5f9;background:#f8fafc;white-space:nowrap;font-size:12px;letter-spacing:.2px}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;white-space:nowrap;font-size:14px;font-weight:500;color:var(--text-primary)}
tr:hover td{background:#f0f6ff}

/* ── Chips ── */
.chip{display:inline-block;padding:2px 7px;border-radius:6px;font-weight:600;font-size:12px}
.chip-green{background:#f0fdf4;color:#16a34a}
.chip-blue{background:#EFF6FF;color:var(--color-positive)}
.chip-amber{background:#fffbeb;color:#d97706}
.chip-red{background:#fef2f2;color:var(--color-negative)}
.chip-default{background:#f1f5f9;color:#334155}

/* ── Filters ── */
.filters{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.filter-label{font-size:12px;font-weight:600;color:#94A3B8;margin-right:4px}
.ftag{padding:4px 11px;border-radius:99px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;color:var(--text-secondary);background:#fff;transition:.15s;font-family:var(--font)}
.ftag.on{color:#fff;border-color:transparent}
.ftag:hover:not(.on){background:#EFF6FF;color:var(--color-brand);border-color:#BFDBFE}
.metric-btn{padding:4px 11px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748b;background:#f1f5f9;transition:.15s;font-family:var(--font)}
.metric-btn.on{background:var(--color-brand);color:#fff}

/* ── Misc ── */
.info-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:10px}
tfoot td{font-weight:700;background:#fffbeb;color:#92400e}
#tip{position:fixed;background:rgba(15,23,42,.93);color:#fff;font-size:12px;padding:7px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:9999;line-height:1.75;white-space:pre;box-shadow:0 4px 14px rgba(0,0,0,.22);font-family:var(--font)}
</style>
</head>

function svgEl(tag,attrs,children=""){
  const a=Object.entries(attrs).map(([k,v])=>`${k}="${v}"`).join(" ");
  return `<${tag} ${a}>${children}</${tag}>`;
}

function barLineChart(data,{width=680,height=220,barKey,lineKey,barLabel,lineLabel,barColor="#6366f1",lineColor="#22c55e",lineMax,xKey="date",rotateLabels=false,xLabelFontSize=10,xTickFn=null,rotateBottom=90}={}){
  const P={top:28,right:56,bottom:rotateLabels?rotateBottom:28,left:52};
  const W=width-P.left-P.right, H=height-P.top-P.bottom;
  const barMax=Math.max(...data.map(d=>d[barKey]||0))*1.15;
  const lMax=lineMax||Math.max(...data.map(d=>d[lineKey]||0))*1.15||1;
  const bw=Math.min(40,Math.max(4,W/data.length*0.6));
  let bars="",lines="",dots="",xLabels="",yLeft="",yRight="";
  data.forEach((d,i)=>{
    const x=P.left+i*(W/data.length)+W/data.length/2;
    const bv=d[barKey]||0, lv=d[lineKey];
    const bh=(bv/barMax)*H;
    bars+=svgEl("rect",{x:x-bw/2,y:P.top+H-bh,width:bw,height:bh,fill:barColor,rx:2,opacity:.85,
      "data-tip":`${d[xKey]}: ${barLabel} ${bv}`});
    if(lv!=null){
      const ly=P.top+H-(lv/lMax)*H;
      if(i>0&&data[i-1][lineKey]!=null){
        const px=P.left+(i-1)*(W/data.length)+W/data.length/2;
        const py=P.top+H-(data[i-1][lineKey]/lMax)*H;
        lines+=svgEl("line",{x1:px,y1:py,x2:x,y2:ly,stroke:lineColor,"stroke-width":2});
      }
      dots+=svgEl("circle",{cx:x,cy:ly,r:3,fill:lineColor,"data-tip":`${d[xKey]}: ${lineLabel} ${lv}`});
    }
    if(rotateLabels){
      const ty=P.top+H+8;
      xLabels+=`<text x="${x}" y="${ty}" text-anchor="end" font-size="${xLabelFontSize}" fill="#64748b" transform="rotate(-40,${x},${ty})">${d[xKey]}</text>`;
    } else {
      const showTick=xTickFn?xTickFn(d,i,data):(i%4===0||i===data.length-1);
      if(showTick) xLabels+=svgEl("text",{x,y:height-6,"text-anchor":"middle","font-size":9,fill:"#94a3b8"},d[xKey]);
    }
  });
  // Y축 눈금
  for(let t=0;t<=4;t++){
    const y=P.top+H*(1-t/4);
    const v=Math.round(barMax*t/4);
    yLeft+=svgEl("text",{x:P.left-6,y:y+3,"text-anchor":"end","font-size":9,fill:"#94a3b8"},v>999?Math.round(v/10000)+"만":v);
    yLeft+=svgEl("line",{x1:P.left,y1:y,x2:P.left+W,y2:y,stroke:"#f3f4f6","stroke-width":1});
    const rv=(lMax*t/4).toFixed(2);
    yRight+=svgEl("text",{x:P.left+W+6,y:y+3,"text-anchor":"start","font-size":9,fill:lineColor},rv);
  }
  const legend=`<g transform="translate(${width/2-63},${P.top-12})">
    <rect x="0" y="-8" width="10" height="10" fill="${barColor}" rx="2"/><text x="14" y="1" font-size="10" fill="#334155">${barLabel}</text>
    <line x1="82" y1="-3" x2="94" y2="-3" stroke="${lineColor}" stroke-width="2"/><circle cx="88" cy="-3" r="3" fill="${lineColor}"/>
    <text x="98" y="1" font-size="10" fill="#334155">${lineLabel}</text>
  </g>`;
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto">${yLeft}${yRight}${bars}${lines}${dots}${xLabels}${legend}</svg>`;
}

function areaChart(data,{width=340,height=180,key,label,color="#6366f1",unit="",xKey="date",yFmt=v=>v,showLabel=true,xTickFn=null}={}){

}

function hBarChart(data,{width=520,height=280,key,label,color="#6366f1",fmtFn=v=>v,nameKey="ch",fontSize=9,barRatio=0.45}={}){
  const P={top:10,right:80,bottom:10,left:80};
  const W=width-P.left-P.right,H=height-P.top-P.bottom;
  const bh=Math.max(7,H/data.length*barRatio);
  const mx=Math.max(...data.map(d=>d[key]||0))*1.1||1;
  let bars="";
  data.forEach((d,i)=>{
    const y=P.top+i*(H/data.length)+(H/data.length-bh)/2;
    const bw=(d[key]||0)/mx*W;
    const ci=CHANNEL.findIndex(c=>c.ch===d[nameKey])||i;
    const col=Array.isArray(color)?COLORS[i%COLORS.length]:color;
    bars+=svgEl("rect",{x:P.left,y,width:Math.max(0,bw),height:bh,fill:col,rx:3,style:"cursor:pointer","data-tip":`${d[nameKey]}\n${label}: ${fmtFn(d[key])}`});
    bars+=svgEl("text",{x:P.left-5,y:y+bh/2+4,"text-anchor":"end","font-size":fontSize,fill:"#334155"},d[nameKey]);
    bars+=svgEl("text",{x:P.left+bw+5,y:y+bh/2+4,"font-size":fontSize,fill:"#334155"},fmtFn(d[key]));
  });
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto">${bars}</svg>`;
}

function pieChart(data,{width=320,height=280,valueKey,nameKey,r=96,fmtFn=v=>v.toLocaleString(),colorFn=null}={}){
  const cx=width/2,cy=height/2;
  const total=data.reduce((s,d)=>s+(d[valueKey]||0),0);
  let angle=-Math.PI/2,slices="",labels="";
  data.forEach((d,i)=>{
    const v=d[valueKey]||0;
    const a=(v/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
    const large=a>Math.PI?1:0;
    const pct=(v/total*100).toFixed(1);
    const col=colorFn?colorFn(d,i):COLORS[i%COLORS.length];
    slices+=svgEl("path",{d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`,fill:col,stroke:"#fff","stroke-width":2,style:"cursor:pointer","data-tip":`${d[nameKey]}\n${fmtFn(v)} (${pct}%)`});
    const midA=angle+a/2,lx=cx+(r*0.65)*Math.cos(midA),ly=cy+(r*0.65)*Math.sin(midA);
    if(v/total>0.06) labels+=svgEl("text",{x:lx,y:ly,"text-anchor":"middle","dominant-baseline":"central","font-size":16,"font-weight":600,fill:"#fff"},`${Math.round(v/total*100)}%`);
    angle+=a;
  });
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto">${slices}${labels}</svg>`;
}

  const allMonths=Object.keys(MONTHS_DATA).sort();
  const cutoff=upToMonth||allMonths[allMonths.length-1];
  const sortedMonths=allMonths.filter(m=>m<=cutoff);

  let totalAd=0, totalJg=0, totalInc=0, totalReg=0;
  const monthRows=sortedMonths.map(m=>{
    const kpi=MONTHS_DATA[m].kpi;
    totalAd  +=kpi.총광고비;
    totalJg  +=kpi.총정기금액;
    totalInc +=kpi.총인입콜||0;
    totalReg +=kpi.총정기건수||0;

let activeMonth="";

  if(!d)return;
  activeMonth=m;
  DAILY=d.daily;CHANNEL=d.channel;OTHER=d.other;MATERIAL=d.material;KPI=d.kpi;
  selCh=new Set(CHANNEL.map(c=>c.ch));
  // 헤더 날짜
  const [y,mo]=m.split("-");
  const first=DAILY[0]?.date||"";
  const last=DAILY[DAILY.length-1]?.date||"";

  document.querySelectorAll("#month-btns .ftag").forEach(b=>{
    b.classList.toggle("active",b.dataset.m===m);

  renderOverview();renderChannel();renderMaterial();renderAnnual(m);
}

  const lastDay=lastDate.split("/")[1]||"";
  const btn=document.createElement("button");
  btn.className="ftag";btn.dataset.m=m;
  btn.innerHTML=`<span style="font-size:12px;font-weight:700">${parseInt(mo)}월</span><span style="font-size:11px;font-weight:400"> (~${lastDay}일)</span>`;
  btn.onclick=()=>loadMonth(m);
  monthBtns.appendChild(btn);
});
const latestMonth=Object.keys(MONTHS_DATA).sort().pop();
loadMonth(latestMonth);
// 사이드바 sticky top = 헤더 높이에 맞춤
document.querySelector('.month-sidebar').style.top=document.querySelector('.header').offsetHeight+'px';

// ────────── 툴팁 ──────────
(function(){
  const tip=document.createElement('div');
  tip.id='tip';
  document.body.appendChild(tip);
  document.addEventListener('mouseover',e=>{
    const t=e.target.closest('[data-tip]');
    if(t){tip.textContent=t.getAttribute('data-tip');tip.style.opacity='1';}
    else tip.style.opacity='0';
  });
  document.addEventListener('mousemove',e=>{
    const vw=window.innerWidth,vh=window.innerHeight;
    const tw=tip.offsetWidth+20,th=tip.offsetHeight+20;
    tip.style.left=(e.clientX+tw>vw?e.clientX-tw+6:e.clientX+14)+'px';
    tip.style.top=(e.clientY+th>vh?e.clientY-th+6:e.clientY-36)+'px';
  });
})();
</script>
