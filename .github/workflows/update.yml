name: 대시보드 자동 업데이트

on:
  push:
    paths:
      - "data/**"        # data/ 폴더에 CSV가 추가/변경될 때만 실행

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 대시보드 업데이트 실행
        run: python update_dashboard.py

      - name: index.html 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "대시보드 자동 갱신 $(date +'%Y-%m-%d')"
          git push
